services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: zimsec
      POSTGRES_USER: zimsec
      POSTGRES_PASSWORD: zimsec
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zimsec"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    env_file: ./backend/.env
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    command: python manage.py runserver 0.0.0.0:8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker:
    build: ./backend
    env_file: ./backend/.env
    volumes:
      - ./backend:/app
    command: celery -A config worker -l info
    depends_on:
      - backend

  celery_beat:
    build: ./backend
    env_file: ./backend/.env
    volumes:
      - ./backend:/app
    command: celery -A config beat -l info
    depends_on:
      - backend

volumes:
  postgres_data:
